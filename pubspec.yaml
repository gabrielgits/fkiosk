name: fkiosk
description: Flutter plugins for Android Enterprise kiosk mode and silent updates.
version: 0.2.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: ao.gabrielvieira.fkiosk
        pluginClass: FKioskPlugin
